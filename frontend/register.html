<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Đăng ký</title><link rel="stylesheet" href="assets/css/styles.css"></head>
<body><header class="header"><div class="logo">Linh Kiện Shop</div><nav id="nav" class="nav"></nav></header>
<main class="container"><section class="card" style="max-width:540px;margin:auto"><div class="card-body"><h2>Đăng ký tài khoản</h2><div id="notice" class="notice"></div>
