<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - BlueTech</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

    <div class="auth-container">
        <div class="auth-header">
            <h1>Đăng Nhập Tài Khoản</h1>
            <p>Chào mừng bạn quay trở lại!<br>Đăng nhập để tiếp tục mua sắm cùng BlueTech.</p>
        </div>

        <form action="#" method="POST" id="loginForm">
            <div class="input-group">
                <i class='bx bx-envelope icon-left'></i>
                <input type="text" class="form-control" placeholder="Email hoặc số điện thoại" required>
            </div>

            <div class="input-group">
                <i class='bx bx-lock-alt icon-left'></i>
                <input type="password" class="form-control" id="password" placeholder="Mật khẩu" required>
                <i class='bx bx-hide icon-right toggle-password' data-target="password"></i>
            </div>

            <div class="options-group">
                <label class="checkbox-label">
                    <input type="checkbox"> Ghi nhớ đăng nhập
                </label>
                <a href="#" class="link">Quên mật khẩu?</a>
            </div>

            <button type="submit" class="btn btn-primary">ĐĂNG NHẬP</button>
        </form>

        <div class="divider">HOẶC</div>

        <button class="btn btn-social">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google">
            Đăng nhập với Google
        </button>
        <button class="btn btn-social">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" alt="Facebook">
            Đăng nhập với Facebook
        </button>

        <div class="auth-footer">
            Chưa có tài khoản? <a href="register.html" class="link">Đăng ký ngay</a>
        </div>
    </div>

    <script src="assets/js/auth.js"></script>
</body>
</html>
