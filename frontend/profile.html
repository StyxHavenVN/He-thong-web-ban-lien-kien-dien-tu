-field"><label>Số điện thoại</label><input name="phone" maxlength="10" required></div><div class="form-field"><label>Vai trò</label><input name="role" disabled></div><div class="form-field full"><label>Địa chỉ</label><input name="address"></div><div class="form-field full"><button class="btn-primary" type="submit">Lưu thay đổi</button></div></form></section><section class="panel profile-password"><div class="panel-header"><h2>Đổi mật khẩu</h2></div><form id="password-form" class="panel-body form-grid"><div class="form-field"><label>Mật khẩu hiện tại</label><input name="currentPassword" type="password" required></div><div class="form-field"><label>Mật khẩu mới</label><input name="newPassword" type="password" minlength="6" required></div><div class="form-field full"><button class="btn-secondary" type="submit">Đổi mật khẩu</button></div></form></section><section class="panel profile-notifications"><div class="panel-header"><h2>Thông báo Email/SMS mô phỏng</h2><button id="read-all" class="btn-secondary" type="button">Đánh dấu đã đọc</button></div><div id="notification-list" class="panel-body"><div class="loading-state">Đang tải thông báo...</div></div></section></section></div></main><div id="site-footer"></div><script src="assets/js/shell.js"></script><script src="assets/js/api.js"></script><script src="assets/js/auth.js"></script><script src="assets/js/profile.js"></script></body></html>
