<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Giỏ hàng</title><link rel="stylesheet" href="assets/css/styles.css"></head>
<body><header class="header"><div class="logo">Linh Kiện Shop</div><nav id="nav" class="nav"></nav></header>
<main class="container"><h1>Giỏ hàng</h1><div id="notice" class="notice"></div><div class="layout-2"><section class="table-wrap"><table><thead><tr><th>Sản phẩm</th><th>Số lượng</th><th>Đơn giá</th><th>Thành tiền</th></tr></thead><tbody id="cartItems"></tbody></table></section><aside class="card"><div class="card-body"><h2>Thanh toán</h2><p>Tổng tiền: <b id="total">0đ</b></p><div class="form-row"><label>Địa chỉ giao hàng</label><textarea id="shippingAddress" rows="3"></textarea></div><div class="form-row"><label>Phương thức thanh toán</label><select id="paymentMethod"><option value="COD">Thanh toán khi nhận hàng</option><option value="ONLINE">Thanh toán trực tuyến</option></select></div><button onclick="checkout()">Đặt hàng</button></div></aside></div></main>
<script src="assets/js/api.js"></script><script src="assets/js/cart.js"></script></body></html>
