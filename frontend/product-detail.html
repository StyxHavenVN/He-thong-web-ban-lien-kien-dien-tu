<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chi tiết sản phẩm - BlueTech</title>

  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="stylesheet" href="assets/css/header.css" />
  <link rel="stylesheet" href="assets/css/navbar.css" />
  <link rel="stylesheet" href="assets/css/responsive.css" />

  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.1.0/uicons-solid-rounded/css/uicons-solid-rounded.css" />
  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.1.0/uicons-regular-rounded/css/uicons-regular-rounded.css" />
  
  <style>
    .detail-container {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--r-lg);
      padding: 30px;
      box-shadow: var(--shadow-xs);
      margin-bottom: 30px;
    }
    .detail-layout {
      display: grid;
      grid-template-columns: 450px 1fr;
      gap: 40px;
    }
    .detail-img-box {
      border: 1.5px solid var(--gray-200);
      border-radius: var(--r-md);
      padding: 20px;
      background: var(--gray-50);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 380px;
      position: relative;
    }
    .detail-img-box img {
      max-height: 100%;
      max-width: 100%;
      object-fit: contain;
    }
    .detail-badge {
      position: absolute;
      top: 15px;
      left: 15px;
      padding: 5px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 700;
      color: var(--white);
      z-index: 5;
    }
    .detail-info {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .detail-title {
      font-size: 24px;
      font-weight: 800;
      color: var(--gray-900);
      line-height: 1.35;
    }
    .detail-meta {
      display: flex;
      gap: 20px;
      font-size: 13.5px;
      color: var(--gray-500);
      align-items: center;
      border-bottom: 1px solid var(--gray-200);
      padding-bottom: 15px;
    }
    .detail-rating {
      color: #ffb800;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .detail-price-box {
      background: var(--gray-50);
      padding: 16px 20px;
      border-radius: var(--r-md);
      display: flex;
      align-items: flex-end;
      gap: 12px;
    }
    .price-big {
      font-size: 28px;
      font-weight: 800;
      color: var(--blue-600);
    }
    .price-old-big {
      font-size: 16px;
      color: var(--gray-400);
      text-decoration: line-through;
      margin-bottom: 4px;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      width: fit-content;
    }
    .status-active {
      background: #e6f7ed;
      color: #1f9254;
    }
    .status-inactive {
      background: #fdf2f2;
      color: #ec5959;
    }
    .detail-actions {
      display: flex;
      gap: 12px;
      margin-top: 10px;
    }
    .quantity-selector {
      display: flex;
      border: 1.5px solid var(--gray-300);
      border-radius: var(--r-sm);
      overflow: hidden;
      width: 120px;
      height: 46px;
    }
    .qty-btn {
      width: 36px;
      border: none;
      background: var(--white);
      cursor: pointer;
      font-size: 18px;
      font-weight: 700;
      color: var(--gray-600);
      transition: background 0.15s;
    }
    .qty-btn:hover {
      background: var(--gray-100);
    }
    .qty-input {
      flex: 1;
      width: 100%;
      border: none;
      border-left: 1.5px solid var(--gray-300);
      border-right: 1.5px solid var(--gray-300);
      text-align: center;
      font-size: 15px;
      font-weight: 700;
      outline: none;
    }
    .btn-buy-now {
      flex: 1;
      height: 46px;
      background: var(--blue-600);
      color: var(--white);
      border: none;
      border-radius: var(--r-sm);
      font-size: 14.5px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-buy-now:hover {
      background: var(--blue-700);
    }
    .btn-add-cart {
      height: 46px;
      padding: 0 20px;
      border: 1.5px solid var(--blue-600);
      border-radius: var(--r-sm);
      background: var(--white);
      color: var(--blue-600);
      font-size: 14.5px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-add-cart:hover {
      background: var(--blue-50);
    }
    .tabs-container {
      margin-top: 40px;
    }
    .tab-header {
      display: flex;
      border-bottom: 2px solid var(--gray-200);
      gap: 30px;
      margin-bottom: 20px;
    }
    .tab-item {
      padding: 10px 0;
      font-size: 16px;
      font-weight: 700;
      color: var(--gray-400);
      cursor: pointer;
      position: relative;
    }
    .tab-item.active {
      color: var(--blue-600);
    }
    .tab-item.active::after {
      content: "";
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--blue-600);
    }
    .tab-content {
      line-height: 1.6;
      font-size: 14.5px;
      color: var(--gray-700);
    }
    .specs-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    .specs-table tr {
      border-bottom: 1px solid var(--gray-200);
    }
    .specs-table tr:nth-child(even) {
      background: var(--gray-50);
    }
    .specs-table td {
      padding: 12px 16px;
      font-size: 14px;
    }
    .specs-table td.spec-name {
      font-weight: 700;
      color: var(--gray-800);
      width: 250px;
    }
    
    @media (max-width: 900px) {
      .detail-layout {
        grid-template-columns: 1fr;
      }
      .detail-img-box {
        height: 300px;
      }
    }
  </style>
</head>

<body>
  <div class="top-bar">
    <div class="container top-bar-container">
      <div class="top-bar-left">
        <span><i class="fi fi-sr-truck-side"></i> Miễn phí giao hàng toàn quốc</span>
        <span><i class="fi fi-sr-time-past"></i> Hoàn trả trong 7 ngày</span>
      </div>
      <div class="top-bar-center">
        <span><i class="fi fi-sr-computer"></i> Build PC dễ dàng - Trả góp 0%</span>
      </div>
      <div class="top-bar-right">
        <span><i class="fi fi-sr-marker"></i> Showroom</span>
        <span><i class="fi fi-sr-document-signed"></i> Tra cứu đơn hàng</span>
        <span><i class="fi fi-sr-headset"></i> Hỗ trợ</span>
      </div>
    </div>
  </div>

  <header class="main-header">
    <div class="container header-container">
      <a href="index.html" class="logo">
        <img src="assets/logo/logo_ver2.png" alt="BlueTech Logo" onerror="this.src='https://placehold.co/200x60/ffffff/0b5edd?text=BlueTech+Logo'" />
      </a>
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="Tìm kiếm linh kiện..." />
        <button type="button" id="search-btn" class="search-btn"><i class="fi fi-br-search"></i></button>
      </div>
      <div class="header-actions">
        <div class="action-item"><span class="action-icon"><i class="fi fi-sr-phone-call"></i></span><div class="action-text"><span class="action-label">Hotline</span><span class="action-value">1900.1234</span></div></div>
        <div class="action-item"><span class="action-icon"><i class="fi fi-sr-user"></i></span><div class="action-text" id="user-auth-area"><a href="login.html" class="action-label" style="text-decoration: none; color: inherit;">Đăng nhập</a><a href="register.html" class="action-value" style="text-decoration: none; color: inherit;">Đăng ký</a></div></div>
        <div class="action-item cart-btn" onclick="window.location.href='cart.html'" style="cursor:pointer;"><span class="action-icon"><i class="fi fi-rr-shopping-cart"></i></span><div class="action-text"><span class="action-label" style="font-size: 13px; font-weight: 700;">Giỏ hàng</span></div></div>
      </div>
    </div>
  </header>

  <nav class="main-nav">
    <div class="container nav-container">
      <a href="index.html" class="nav-item" style="text-decoration:none;"><i class="fi fi-sr-settings"></i> Trang chủ</a>
      <a href="products.html" class="nav-item" style="text-decoration:none; background: rgba(255,255,255,0.15); color: var(--white); border-bottom-color: var(--white);"><i class="fi fi-sr-box-alt"></i> Sản phẩm</a>
      <div class="nav-item"><i class="fi fi-sr-star"></i> Khuyến mãi</div>
      <div class="nav-item"><i class="fi fi-sr-laptop"></i> Laptop</div>
      <div class="nav-item"><i class="fi fi-sr-headphones"></i> Phụ kiện</div>
      <div class="nav-item"><i class="fi fi-sr-screen"></i> Màn hình</div>
    </div>
  </nav>

  <div class="container">
    <div class="breadcrumb" style="padding: 16px 0; font-size: 13.5px; color: var(--gray-600);" id="breadcrumb-container">
      <a href="index.html">Trang chủ</a> > <a href="products.html">Sản phẩm</a> > <strong id="breadcrumb-product-name" style="color: var(--gray-900);">Đang tải...</strong>
    </div>

    <!-- Khu vực hiển thị thông tin sản phẩm -->
    <div id="product-detail-wrapper">
      <div class="detail-container" style="text-align: center; padding: 60px;">
         <p style="font-weight: bold; color: var(--blue-600); font-size: 16px;">Đang tải dữ liệu chi tiết sản phẩm...</p>
      </div>
    </div>
  </div>

  <script src="assets/js/auth.js"></script>
  <script src="assets/js/product-detail.js"></script>
</body>
</html>
