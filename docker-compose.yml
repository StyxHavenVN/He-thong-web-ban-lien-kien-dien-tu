services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: web-linh-kien-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: do-an-c4-secret-key
    volumes:
      - ./backend/src/data:/app/backend/src/data
    ports:
      - "3000:3000"
    networks:
      - web-linh-kien-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: web-linh-kien-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    networks:
      - web-linh-kien-network

networks:
  web-linh-kien-network:
    driver: bridge
