version: '3.8'

services:
  # Thêm dịch vụ Database PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: web-linh-kien-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: web_linh_kien
    ports:
      - "5432:5432"
    networks:
      - web-linh-kien-network
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d web_linh_kien"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: web-linh-kien-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: do-an-c4-secret-key
      # Thêm chuỗi kết nối Database cho backend
      DATABASE_URL: postgres://root:rootpassword@db:5432/web_linh_kien
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - web-linh-kien-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: web-linh-kien-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
    networks:
      - web-linh-kien-network

networks:
  web-linh-kien-network:
    driver: bridge

volumes:
  pgdata: # Dùng để lưu trữ dữ liệu SQL không bị mất khi tắt Docker
